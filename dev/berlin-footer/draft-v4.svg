<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" shape-rendering="crispEdges">
  <!-- DRAFT V4 — fixes the three v3 issues:
       1) Multi-pass outlines for varied stroke-width (Redaction-distress)
       2) Visible shimmer (faster cycle, larger dashoffset shift) +
          clouds get BOTH shimmer AND drift via comma-separated animation
       3) Pope's Revenge as gold reflection INSIDE the sphere, not as a
          cross-shaped overlay on top -->

  <defs>
    <style>
      /* --- Base outline stack ----------------------------------------
         Each density renders THREE passes that overlay on the same shape:
           .out-main    : medium stroke, normal dash
           .out-thin    : thin stroke, sparse dash (between main dashes)
           .out-blot    : thick stroke, very rare dash (ink blot accents)
         The combination produces an outline with varied thickness, like
         Redaction's per-character distress.
         For pixel-grid feel we use stroke-linecap=square. */
      .out      { fill: none; stroke: #4f8375; stroke-linecap: square; }
      .out-main { stroke-width: 2; }
      .out-thin { stroke-width: 1; opacity: 0.85; }
      .out-blot { stroke-width: 3; opacity: 0.8; }

      .tight-main { stroke-dasharray: 3 1; }
      .tight-thin { stroke-dasharray: 1 5; stroke-dashoffset: 2; }
      .tight-blot { stroke-dasharray: 1 17; stroke-dashoffset: 3; }

      .loose-main { stroke-dasharray: 2 2; }
      .loose-thin { stroke-dasharray: 1 7; stroke-dashoffset: 3; }
      .loose-blot { stroke-dasharray: 1 23; stroke-dashoffset: 5; }

      .sparse-main { stroke-dasharray: 1 3; }
      .sparse-thin { stroke-dasharray: 1 11; stroke-dashoffset: 2; }
      .sparse-blot { stroke-dasharray: 1 29; stroke-dashoffset: 7; }

      .dot      { fill: #4f8375; }
      .dot-soft { fill: #4f8375; opacity: 0.55; }
      .gold     { fill: #d8b16e; }
      .neg      { fill: #f8f3ee; }

      /* --- Shimmer animation -----------------------------------------
         Larger dashoffset shift than v3 (16 instead of 8), faster cycle
         (1.6s instead of 3.2s), so the texture visibly shifts.
         Each pass has its own period so the layers don't sync. */
      @keyframes shimmer-main { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 16; } }
      @keyframes shimmer-thin { from { stroke-dashoffset: 2; } to { stroke-dashoffset: 18; } }
      @keyframes shimmer-blot { from { stroke-dashoffset: 3; } to { stroke-dashoffset: 19; } }

      .tight-main, .loose-main, .sparse-main { animation: shimmer-main 1.6s steps(4) infinite; }
      .tight-thin, .loose-thin, .sparse-thin { animation: shimmer-thin 2.4s steps(8) infinite reverse; }
      .tight-blot, .loose-blot, .sparse-blot { animation: shimmer-blot 3.2s steps(6) infinite; }

      /* --- Clouds drift back-and-forth (faster, more visible) ---------
         Comma-separated animations so the cloud paths ALSO keep their
         shimmer (the v3 bug was a shorthand animation overriding it). */
      @keyframes drift-fg { from { transform: translate(0, 0); } to { transform: translate(60px, 0); } }
      @keyframes drift-bg { from { transform: translate(0, 0); } to { transform: translate(-44px, 0); } }

      .cloud-a { animation: shimmer-main 1.6s steps(4) infinite, drift-fg 16s ease-in-out infinite alternate; transform-box: fill-box; }
      .cloud-b { animation: shimmer-main 2.0s steps(4) infinite, drift-bg 22s ease-in-out infinite alternate; transform-box: fill-box; }

      /* --- Sun pulse */
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }
      .weather-sun { animation: pulse 4s ease-in-out infinite; }

      /* --- Rain falls with staggered delays */
      @keyframes rain-fall {
        from { transform: translateY(-6px); opacity: 0; }
        25%  { opacity: 0.7; }
        75%  { opacity: 0.7; }
        to   { transform: translateY(8px); opacity: 0; }
      }
      .weather-rain line { animation: rain-fall 1.0s linear infinite; }
      .weather-rain line:nth-child(2n)   { animation-delay: 0.25s; }
      .weather-rain line:nth-child(3n)   { animation-delay: 0.50s; }
      .weather-rain line:nth-child(5n)   { animation-delay: 0.75s; }
      .weather-rain line:nth-child(7n+1) { animation-delay: 0.10s; }

      /* --- Pope's Revenge — gold cross INSIDE the sphere, fading in */
      .pope-cross { opacity: 0; transition: opacity 1.5s ease-out 0.3s; }
    </style>
  </defs>

  <!-- ================================================================ -->
  <!-- WEATHER LAYERS                                                    -->
  <!-- ================================================================ -->

  <g class="weather-layer weather-sun">
    <circle cx="360" cy="40" r="9" fill="none" stroke="#d8b16e" stroke-width="2" stroke-dasharray="2 1" />
