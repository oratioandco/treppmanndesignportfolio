    <rect x="388" y="56" width="2" height="2" />
    <rect x="390" y="56" width="4" height="2" />
    <rect x="394" y="56" width="2" height="2" />
    <rect x="384" y="58" width="2" height="2" />
    <rect x="386" y="58" width="2" height="2" />
    <rect x="396" y="58" width="2" height="2" />
    <rect x="398" y="58" width="2" height="2" />
    <rect x="382" y="60" width="2" height="2" />
    <rect x="400" y="60" width="2" height="2" />
    <rect x="382" y="62" width="2" height="2" />
    <rect x="400" y="62" width="2" height="2" />
    <rect x="382" y="64" width="2" height="2" />
    <rect x="400" y="64" width="2" height="2" />
    <rect x="384" y="66" width="2" height="2" />
    <rect x="386" y="66" width="2" height="2" />
    <rect x="396" y="66" width="2" height="2" />
    <rect x="398" y="66" width="2" height="2" />
    <rect x="388" y="68" width="2" height="2" />
    <rect x="390" y="68" width="4" height="2" />
    <rect x="394" y="68" width="2" height="2" />
  </g>

  <rect x="389" y="70" width="6" height="6" fill="none" stroke="#4f8375" stroke-width="2" />
  <line x1="392" y1="76" x2="392" y2="146" stroke="#4f8375" stroke-width="2" />
