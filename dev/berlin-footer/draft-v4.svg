      <rect x="343" y="39" width="3" height="2" /><rect x="374" y="39" width="3" height="2" />
      <rect x="348" y="28" width="2" height="2" /><rect x="370" y="50" width="2" height="2" />
      <rect x="348" y="50" width="2" height="2" /><rect x="370" y="28" width="2" height="2" />
    </g>
  </g>

  <g class="weather-layer weather-cloud">
    <!-- Each cloud rendered with three overlaid passes for thickness variation -->
    <g class="cloud-a">
      <path class="out out-main tight-main" d="M 76 48 L 76 44 L 84 44 L 84 40 L 92 40 L 92 36 L 116 36 L 116 32 L 128 32 L 128 36 L 136 36 L 136 40 L 140 40 L 140 48 Z" />
      <path class="out out-thin tight-thin" d="M 76 48 L 76 44 L 84 44 L 84 40 L 92 40 L 92 36 L 116 36 L 116 32 L 128 32 L 128 36 L 136 36 L 136 40 L 140 40 L 140 48 Z" />
      <path class="out out-blot tight-blot" d="M 76 48 L 76 44 L 84 44 L 84 40 L 92 40 L 92 36 L 116 36 L 116 32 L 128 32 L 128 36 L 136 36 L 136 40 L 140 40 L 140 48 Z" />
    </g>
    <g class="cloud-b">
      <path class="out out-main loose-main" d="M 196 36 L 196 32 L 204 32 L 204 28 L 212 28 L 212 24 L 232 24 L 232 28 L 240 28 L 240 32 L 244 32 L 244 36 Z" />
      <path class="out out-thin loose-thin" d="M 196 36 L 196 32 L 204 32 L 204 28 L 212 28 L 212 24 L 232 24 L 232 28 L 240 28 L 240 32 L 244 32 L 244 36 Z" />
    </g>
  </g>

  <g class="weather-layer weather-rain" stroke="#4f8375" stroke-width="1">
    <line x1="84"  y1="54" x2="84"  y2="58" />
    <line x1="92"  y1="58" x2="92"  y2="62" />
    <line x1="100" y1="54" x2="100" y2="58" />
    <line x1="108" y1="58" x2="108" y2="62" />
    <line x1="116" y1="54" x2="116" y2="58" />
    <line x1="124" y1="58" x2="124" y2="62" />
    <line x1="132" y1="54" x2="132" y2="58" />
    <line x1="204" y1="42" x2="204" y2="46" />
    <line x1="212" y1="44" x2="212" y2="48" />
    <line x1="220" y1="42" x2="220" y2="46" />
    <line x1="228" y1="44" x2="228" y2="48" />
    <line x1="236" y1="42" x2="236" y2="46" />
  </g>

  <!-- ================================================================ -->
  <!-- SKYLINE — multi-pass outlines                                     -->
  <!-- ================================================================ -->

  <!-- Distant buildings — sparse 2-pass (main + thin), no blot at distance -->
  <g><rect x="40" y="128" width="22" height="22" class="out out-main sparse-main" /><rect x="40" y="128" width="22" height="22" class="out out-thin sparse-thin" /></g>
  <g><rect x="66" y="122" width="14" height="28" class="out out-main sparse-main" /><rect x="66" y="122" width="14" height="28" class="out out-thin sparse-thin" /></g>
  <g><rect x="84" y="130" width="12" height="20" class="out out-main sparse-main" /><rect x="84" y="130" width="12" height="20" class="out out-thin sparse-thin" /></g>

  <!-- Stepped building — full 3-pass -->
  <path d="M 100 150 L 100 124 L 110 124 L 110 116 L 120 116 L 120 124 L 130 124 L 130 150 Z" class="out out-main tight-main" />
  <path d="M 100 150 L 100 124 L 110 124 L 110 116 L 120 116 L 120 124 L 130 124 L 130 150 Z" class="out out-thin tight-thin" />
  <path d="M 100 150 L 100 124 L 110 124 L 110 116 L 120 116 L 120 124 L 130 124 L 130 150 Z" class="out out-blot tight-blot" />
  <rect x="103" y="130" width="2" height="2" class="dot" />
  <rect x="111" y="120" width="2" height="2" class="dot" />
  <rect x="123" y="130" width="2" height="2" class="dot" />
  <rect x="111" y="138" width="2" height="2" class="dot" />

  <!-- Crane — line-art, no multi-pass (the thin lines stay clean) -->
  <g stroke="#4f8375" stroke-width="2" fill="none" stroke-linecap="square">
    <line x1="156" y1="78" x2="156" y2="150" stroke-dasharray="3 1" />
    <line x1="132" y1="80" x2="176" y2="80" stroke-dasharray="2 1" />
    <line x1="156" y1="76" x2="170" y2="76" />
    <rect x="153" y="82" width="6" height="5" stroke-width="1" />
    <line x1="138" y1="80" x2="138" y2="92" stroke-width="1" />
  </g>
  <rect x="136" y="92" width="4" height="2" class="dot" />

  <!-- Slanted-roof building — full 3-pass -->
  <path d="M 184 150 L 184 130 L 188 124 L 208 124 L 212 130 L 212 150 Z" class="out out-main tight-main" />
  <path d="M 184 150 L 184 130 L 188 124 L 208 124 L 212 130 L 212 150 Z" class="out out-thin tight-thin" />
  <path d="M 184 150 L 184 130 L 188 124 L 208 124 L 212 130 L 212 150 Z" class="out out-blot tight-blot" />
  <rect x="190" y="134" width="2" height="2" class="dot" />
  <rect x="198" y="134" width="2" height="2" class="dot" />
  <rect x="206" y="134" width="2" height="2" class="dot" />
  <rect x="190" y="142" width="2" height="2" class="dot" />
  <rect x="198" y="142" width="2" height="2" class="dot" />
  <rect x="206" y="142" width="2" height="2" class="dot" />

  <!-- Berliner Dom — full 3-pass on body, dome stays as pixel arc -->
  <g>
    <rect x="220" y="130" width="64" height="20" class="out out-main tight-main" />
    <rect x="220" y="130" width="64" height="20" class="out out-thin tight-thin" />
    <rect x="220" y="130" width="64" height="20" class="out out-blot tight-blot" />
    <rect x="240" y="118" width="24" height="12" class="out out-main tight-main" />
    <rect x="240" y="118" width="24" height="12" class="out out-thin tight-thin" />
    <rect x="220" y="120" width="8" height="10" class="out out-main tight-main" />
