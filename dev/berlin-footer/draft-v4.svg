  <line x1="0" y1="155" x2="480" y2="155" stroke="#4f8375" stroke-width="1" stroke-dasharray="1 4" opacity="0.5" />

  <!-- TREE -->
  <line x1="446" y1="142" x2="446" y2="151" stroke="#4f8375" stroke-width="2" />
  <circle cx="446" cy="136" r="6" class="out out-main tight-main" />
  <circle cx="446" cy="136" r="6" class="out out-thin tight-thin" />
  <rect x="444" y="134" width="1" height="1" class="dot" />
