  <rect x="389" y="50" width="6" height="6" fill="none" stroke="#4f8375" stroke-width="2" />

  <!-- ===== Pope's Revenge — the cross is a GOLD REFLECTION INSIDE the
       sphere when sunlight catches the steel plate seams. Drawn first
       so the sphere outline overlays it (the reflection is "behind"
       the perimeter dots). When sunny, opacity fades from 0 to 1. ===== -->
  <g class="weather-layer pope-cross">
    <!-- Vertical arm (along the central seam of the steel paneling) -->
    <rect x="391" y="58" width="3" height="10" class="gold" />
    <!-- Horizontal arm (along the equatorial seam) -->
    <rect x="384" y="62" width="17" height="3" class="gold" />
  </g>

  <!-- Sphere outline (sage dots) — drawn AFTER the cross so the perimeter
       sits on top of the reflection -->
