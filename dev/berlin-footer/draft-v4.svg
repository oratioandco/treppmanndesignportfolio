  <path d="M 294 150 L 294 128 L 304 128 L 304 122 L 316 122 L 316 128 L 320 128 L 320 150 Z" class="out out-thin tight-thin" />
  <rect x="298" y="134" width="2" height="2" class="dot" />
  <rect x="308" y="128" width="2" height="2" class="dot" />
  <rect x="298" y="142" width="2" height="2" class="dot" />
  <rect x="308" y="138" width="2" height="2" class="dot" />

  <rect x="324" y="134" width="12" height="16" class="out out-main loose-main" />
  <rect x="324" y="134" width="12" height="16" class="out out-thin loose-thin" />
  <rect x="328" y="138" width="2" height="2" class="dot" />
  <rect x="328" y="144" width="2" height="2" class="dot" />

  <rect x="342" y="126" width="6" height="24" class="out out-main loose-main" />
  <rect x="342" y="126" width="6" height="24" class="out out-thin loose-thin" />

  <!-- TV Tower -->
