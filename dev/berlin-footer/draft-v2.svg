<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" shape-rendering="crispEdges">
  <!-- DRAFT V2 — line-art / outlined / pixel-broken-edge character.
       Outlines via stroke-dasharray to give each element its own
       distress pattern, more like the Redaction font's per-character
       texture. Reichstag dropped. TV Tower sphere is a discrete pixel-
       circle (cluster of small rects). Generic-building rooflines
       varied (stepped, slanted, flat). Windows are sparse dots, not
       fills. -->

  <defs>
    <!-- Reusable stroke style: sage, 2px, pixel-broken dash patterns -->
    <style>
      .out { fill: none; stroke: #4f8375; stroke-width: 2; }
      .out-loose  { stroke-dasharray: 2 2; }
      .out-tight  { stroke-dasharray: 3 1; }
      .out-sparse { stroke-dasharray: 1 3; }
      .out-solid  { /* no dash */ }
      .dot        { fill: #4f8375; }
      .dot-soft   { fill: #4f8375; opacity: 0.55; }
      .neg        { fill: #f8f3ee; }
    </style>
  </defs>

  <!-- ================================================================ -->
  <!-- WEATHER LAYERS                                                    -->
  <!-- ================================================================ -->

  <!-- SUN — line-art circle + ray dots -->
  <g class="weather-layer weather-sun">
    <circle cx="360" cy="40" r="9" fill="none" stroke="#d8b16e" stroke-width="2" stroke-dasharray="2 1" />
    <g fill="#d8b16e">
      <rect x="359" y="24" width="2" height="3" />
      <rect x="359" y="55" width="2" height="3" />
      <rect x="343" y="39" width="3" height="2" />
      <rect x="374" y="39" width="3" height="2" />
      <rect x="348" y="28" width="2" height="2" />
      <rect x="370" y="50" width="2" height="2" />
      <rect x="348" y="50" width="2" height="2" />
      <rect x="370" y="28" width="2" height="2" />
    </g>
  </g>

  <!-- CLOUDS — outlined puffy shapes, no fill -->
  <g class="weather-layer weather-cloud">
    <!-- Cloud A (bigger, foreground) -->
    <path d="M 76 48 L 76 44 L 84 44 L 84 40 L 92 40 L 92 36 L 116 36 L 116 32 L 128 32 L 128 36 L 136 36 L 136 40 L 140 40 L 140 48 Z"
          class="out out-tight" />
    <!-- Cloud B (smaller, further) -->
    <path d="M 196 36 L 196 32 L 204 32 L 204 28 L 212 28 L 212 24 L 232 24 L 232 28 L 240 28 L 240 32 L 244 32 L 244 36 Z"
          class="out out-loose" />
  </g>

  <!-- RAIN — short broken vertical dashes -->
  <g class="weather-layer weather-rain" stroke="#4f8375" stroke-width="1" opacity="0.7">
    <line x1="84" y1="54" x2="84" y2="58" />
    <line x1="92" y1="58" x2="92" y2="62" />
    <line x1="100" y1="54" x2="100" y2="58" />
    <line x1="108" y1="58" x2="108" y2="62" />
    <line x1="116" y1="54" x2="116" y2="58" />
    <line x1="124" y1="58" x2="124" y2="62" />
    <line x1="132" y1="54" x2="132" y2="58" />
    <line x1="204" y1="42" x2="204" y2="46" />
    <line x1="212" y1="44" x2="212" y2="48" />
    <line x1="220" y1="42" x2="220" y2="46" />
    <line x1="228" y1="44" x2="228" y2="48" />
    <line x1="236" y1="42" x2="236" y2="46" />
  </g>

  <!-- ================================================================ -->
  <!-- SKYLINE — outlined line-art, pixel-broken edges                   -->
  <!-- ================================================================ -->

  <!-- ===== Generic distant buildings (sparse stroke — depth cue) ===== -->
  <rect x="40" y="128" width="22" height="22" class="out out-sparse" />
  <rect x="66" y="122" width="14" height="28" class="out out-sparse" />
  <rect x="84" y="130" width="12" height="20" class="out out-sparse" />

  <!-- ===== Mid-ground building with stepped roofline ===== -->
  <path d="M 100 150 L 100 124 L 110 124 L 110 116 L 120 116 L 120 124 L 130 124 L 130 150 Z"
        class="out out-tight" />
  <!-- Sparse window dots -->
  <rect x="103" y="130" width="2" height="2" class="dot" />
  <rect x="111" y="120" width="2" height="2" class="dot" />
  <rect x="123" y="130" width="2" height="2" class="dot" />
  <rect x="111" y="138" width="2" height="2" class="dot" />

  <!-- ===== Construction crane — pure line art ===== -->
  <g stroke="#4f8375" stroke-width="2" fill="none">
    <!-- Mast (broken line for "scaffolding" feel) -->
    <line x1="156" y1="78" x2="156" y2="150" stroke-dasharray="3 1" />
    <!-- Jib horizontal arm -->
    <line x1="132" y1="80" x2="176" y2="80" stroke-dasharray="2 1" />
    <!-- Counter-jib -->
    <line x1="156" y1="76" x2="170" y2="76" />
    <!-- Operator cabin -->
    <rect x="153" y="82" width="6" height="5" stroke-width="1" />
    <!-- Hook line + hook -->
    <line x1="138" y1="80" x2="138" y2="92" stroke-width="1" />
  </g>
  <rect x="136" y="92" width="4" height="2" class="dot" />

  <!-- ===== Mid-ground building with slanted roofline ===== -->
  <path d="M 184 150 L 184 130 L 188 124 L 208 124 L 212 130 L 212 150 Z"
        class="out out-tight" />
  <rect x="190" y="134" width="2" height="2" class="dot" />
  <rect x="198" y="134" width="2" height="2" class="dot" />
  <rect x="206" y="134" width="2" height="2" class="dot" />
  <rect x="190" y="142" width="2" height="2" class="dot" />
  <rect x="198" y="142" width="2" height="2" class="dot" />
  <rect x="206" y="142" width="2" height="2" class="dot" />

  <!-- ===== Berliner Dom — outlined, dome as pixel arc ===== -->
  <g class="out out-tight">
    <!-- Base / colonnade -->
    <rect x="220" y="130" width="64" height="20" />
    <!-- Drum -->
    <rect x="240" y="118" width="24" height="12" />
    <!-- Side towers -->
    <rect x="220" y="120" width="8" height="10" />
    <rect x="276" y="120" width="8" height="10" />
  </g>
  <!-- Dome (pixel-stepped arc) -->
  <g class="dot">
    <rect x="244" y="116" width="2" height="2" />
    <rect x="246" y="114" width="2" height="2" />
    <rect x="248" y="112" width="2" height="2" />
    <rect x="250" y="110" width="4" height="2" />
    <rect x="254" y="112" width="2" height="2" />
    <rect x="256" y="114" width="2" height="2" />
    <rect x="258" y="116" width="2" height="2" />
    <!-- Lantern -->
    <rect x="251" y="106" width="2" height="4" />
    <!-- Cross -->
    <rect x="251" y="100" width="2" height="6" />
    <rect x="248" y="102" width="8" height="2" />
  </g>
  <!-- Side tower caps -->
  <rect x="222" y="116" width="4" height="4" class="dot" />
  <rect x="278" y="116" width="4" height="4" class="dot" />
  <!-- Colonnade hints — sparse vertical lines on the base -->
  <g class="dot-soft">
    <rect x="228" y="132" width="1" height="14" />
    <rect x="236" y="132" width="1" height="14" />
    <rect x="244" y="132" width="1" height="14" />
    <rect x="252" y="132" width="1" height="14" />
    <rect x="260" y="132" width="1" height="14" />
    <rect x="268" y="132" width="1" height="14" />
    <rect x="276" y="132" width="1" height="14" />
  </g>

  <!-- ===== Mid-ground buildings between Dom and TV Tower ===== -->
  <!-- Stepped -->
  <path d="M 294 150 L 294 128 L 304 128 L 304 122 L 316 122 L 316 128 L 320 128 L 320 150 Z"
        class="out out-tight" />
  <rect x="298" y="134" width="2" height="2" class="dot" />
  <rect x="308" y="128" width="2" height="2" class="dot" />
  <rect x="298" y="142" width="2" height="2" class="dot" />
  <rect x="308" y="138" width="2" height="2" class="dot" />

  <!-- Short building -->
  <rect x="324" y="134" width="12" height="16" class="out out-loose" />
  <rect x="328" y="138" width="2" height="2" class="dot" />
  <rect x="328" y="144" width="2" height="2" class="dot" />

  <!-- Sliver -->
  <rect x="342" y="126" width="6" height="24" class="out out-loose" />

  <!-- ===== TV Tower (Fernsehturm) — line-art dominant element ===== -->
  <!-- Antenna spike (single thin line) -->
  <line x1="392" y1="14" x2="392" y2="50" stroke="#4f8375" stroke-width="2" />
  <!-- Antenna base segment -->
  <rect x="389" y="50" width="6" height="6" class="out out-solid" />

  <!-- Sphere — discrete pixel-circle (cluster of rects forming a hemisphere outline) -->
  <g class="dot">
    <!-- Top arc -->
    <rect x="388" y="56" width="2" height="2" />
    <rect x="390" y="56" width="4" height="2" />
    <rect x="394" y="56" width="2" height="2" />
    <!-- Upper-mid -->
    <rect x="384" y="58" width="2" height="2" />
    <rect x="386" y="58" width="2" height="2" />
    <rect x="396" y="58" width="2" height="2" />
    <rect x="398" y="58" width="2" height="2" />
    <!-- Mid (widest) -->
    <rect x="382" y="60" width="2" height="2" />
    <rect x="400" y="60" width="2" height="2" />
    <rect x="382" y="62" width="2" height="2" />
    <rect x="400" y="62" width="2" height="2" />
    <rect x="382" y="64" width="2" height="2" />
    <rect x="400" y="64" width="2" height="2" />
    <!-- Lower-mid -->
    <rect x="384" y="66" width="2" height="2" />
    <rect x="386" y="66" width="2" height="2" />
    <rect x="396" y="66" width="2" height="2" />
    <rect x="398" y="66" width="2" height="2" />
    <!-- Bottom arc -->
    <rect x="388" y="68" width="2" height="2" />
    <rect x="390" y="68" width="4" height="2" />
    <rect x="394" y="68" width="2" height="2" />
  </g>
  <!-- Sphere "windows" (negative space, only 2-3) -->
  <rect x="388" y="62" width="2" height="2" class="neg" />
  <rect x="394" y="62" width="2" height="2" class="neg" />

  <!-- Tapered column from sphere down -->
  <rect x="389" y="70" width="6" height="6" class="out out-solid" />
  <line x1="392" y1="76" x2="392" y2="146" stroke="#4f8375" stroke-width="2" />
  <!-- Base -->
  <rect x="386" y="146" width="12" height="4" class="out out-solid" />

  <!-- POPE'S REVENGE — bigger cross overlay on sphere -->
  <g class="weather-layer weather-pope-cross neg">
    <rect x="391" y="58" width="2" height="12" />
    <rect x="385" y="62" width="14" height="2" />
  </g>

  <!-- ================================================================ -->
  <!-- GROUND + FOREGROUND                                               -->
  <!-- ================================================================ -->

  <!-- Ground line: pixel-broken dashed -->
  <line x1="0" y1="151" x2="480" y2="151" stroke="#4f8375" stroke-width="2" stroke-dasharray="3 1" />
  <line x1="0" y1="155" x2="480" y2="155" stroke="#4f8375" stroke-width="1" stroke-dasharray="1 4" opacity="0.5" />

  <!-- Tree foreground — left of TV Tower so it doesn't compete -->
  <g>
    <!-- Trunk -->
    <line x1="446" y1="142" x2="446" y2="151" stroke="#4f8375" stroke-width="2" />
    <!-- Foliage outline -->
    <circle cx="446" cy="136" r="6" class="out out-tight" />
    <!-- A few internal dots for "leafy" texture -->
    <rect x="444" y="134" width="1" height="1" class="dot" />
    <rect x="448" y="136" width="1" height="1" class="dot" />
    <rect x="445" y="138" width="1" height="1" class="dot" />
  </g>

  <!-- Grass tufts (line marks) -->
  <g stroke="#4f8375" stroke-width="1">
    <line x1="20" y1="149" x2="20" y2="151" />
    <line x1="24" y1="148" x2="24" y2="151" />
    <line x1="170" y1="148" x2="170" y2="151" />
    <line x1="174" y1="149" x2="174" y2="151" />
    <line x1="350" y1="149" x2="350" y2="151" />
    <line x1="354" y1="148" x2="354" y2="151" />
    <line x1="358" y1="149" x2="358" y2="151" />
    <line x1="460" y1="148" x2="460" y2="151" />
    <line x1="464" y1="149" x2="464" y2="151" />
  </g>

</svg>
