<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" shape-rendering="crispEdges">
  <!-- DRAFT V3 — v2 composition + embedded animations.
       Self-contained: CSS animations live inside the SVG <defs><style> so
       this file works the same whether opened standalone or embedded in
       the Astro component. State (data-weather) is controlled by the
       wrapping element; opacity transitions handle the cross-fade. -->

  <defs>
    <style>
      .out { fill: none; stroke: #4f8375; stroke-width: 2; }
      .out-loose  { stroke-dasharray: 2 2; }
      .out-tight  { stroke-dasharray: 3 1; }
      .out-sparse { stroke-dasharray: 1 3; }
      .out-solid  { }
      .dot      { fill: #4f8375; }
      .dot-soft { fill: #4f8375; opacity: 0.55; }
      .neg      { fill: #f8f3ee; }

      /* ===== Stroke-dashoffset shimmer — the "alive pixelation" effect.
         Each density gets its own period and direction so the texture
         doesn't pulse in sync across the skyline. steps() makes the dash
         shifts discrete, which reads as pixel-jump rather than smooth glide.
         Same conceptual lineage as the Redaction-cut headline animation. */
      @keyframes shimmer-a { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 8;  } }
      @keyframes shimmer-b { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 12; } }
      @keyframes shimmer-c { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 16; } }

      .out-tight  { animation: shimmer-a 3.2s steps(8) infinite; }
      .out-loose  { animation: shimmer-b 4.8s steps(6) infinite reverse; }
      .out-sparse { animation: shimmer-c 6.4s steps(4) infinite; }

      /* ===== Clouds drift back-and-forth at different speeds (parallax) */
      @keyframes drift-fg { from { transform: translateX(0); } to { transform: translateX(40px); } }
      @keyframes drift-bg { from { transform: translateX(0); } to { transform: translateX(-26px); } }

      .cloud-a { animation: drift-fg 48s ease-in-out infinite alternate; transform-origin: center; transform-box: fill-box; }
      .cloud-b { animation: drift-bg 72s ease-in-out infinite alternate; transform-origin: center; transform-box: fill-box; }

      /* ===== Sun gentle pulse */
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
      .weather-sun { animation: pulse 5s ease-in-out infinite; }

      /* ===== Rain falls — translateY loop, varied delays per drop via :nth-child */
      @keyframes rain-fall {
        from { transform: translateY(-6px); opacity: 0; }
        20%  { opacity: 0.7; }
        80%  { opacity: 0.7; }
        to   { transform: translateY(6px);  opacity: 0; }
      }
      .weather-rain line { animation: rain-fall 1.2s linear infinite; }
      .weather-rain line:nth-child(2n)   { animation-delay: 0.3s; }
      .weather-rain line:nth-child(3n)   { animation-delay: 0.6s; }
      .weather-rain line:nth-child(5n)   { animation-delay: 0.9s; }
      .weather-rain line:nth-child(7n+1) { animation-delay: 0.15s; }

      /* ===== Pope's Revenge cross — fades in over 1.5s when sphere catches sun */
      .weather-pope-cross { opacity: 0; transition: opacity 1.5s ease-out 0.3s; }
    </style>
  </defs>

  <!-- ================================================================ -->
  <!-- WEATHER LAYERS                                                    -->
  <!-- ================================================================ -->

  <g class="weather-layer weather-sun">
    <circle cx="360" cy="40" r="9" fill="none" stroke="#d8b16e" stroke-width="2" stroke-dasharray="2 1" />
    <g fill="#d8b16e">
      <rect x="359" y="24" width="2" height="3" />
      <rect x="359" y="55" width="2" height="3" />
      <rect x="343" y="39" width="3" height="2" />
      <rect x="374" y="39" width="3" height="2" />
      <rect x="348" y="28" width="2" height="2" />
      <rect x="370" y="50" width="2" height="2" />
      <rect x="348" y="50" width="2" height="2" />
      <rect x="370" y="28" width="2" height="2" />
    </g>
  </g>

  <g class="weather-layer weather-cloud">
    <path class="out out-tight cloud-a" d="M 76 48 L 76 44 L 84 44 L 84 40 L 92 40 L 92 36 L 116 36 L 116 32 L 128 32 L 128 36 L 136 36 L 136 40 L 140 40 L 140 48 Z" />
    <path class="out out-loose cloud-b" d="M 196 36 L 196 32 L 204 32 L 204 28 L 212 28 L 212 24 L 232 24 L 232 28 L 240 28 L 240 32 L 244 32 L 244 36 Z" />
  </g>

  <g class="weather-layer weather-rain" stroke="#4f8375" stroke-width="1">
    <line x1="84"  y1="54" x2="84"  y2="58" />
    <line x1="92"  y1="58" x2="92"  y2="62" />
    <line x1="100" y1="54" x2="100" y2="58" />
    <line x1="108" y1="58" x2="108" y2="62" />
    <line x1="116" y1="54" x2="116" y2="58" />
    <line x1="124" y1="58" x2="124" y2="62" />
    <line x1="132" y1="54" x2="132" y2="58" />
    <line x1="204" y1="42" x2="204" y2="46" />
    <line x1="212" y1="44" x2="212" y2="48" />
    <line x1="220" y1="42" x2="220" y2="46" />
    <line x1="228" y1="44" x2="228" y2="48" />
    <line x1="236" y1="42" x2="236" y2="46" />
  </g>

  <!-- ================================================================ -->
  <!-- SKYLINE                                                           -->
  <!-- ================================================================ -->

  <!-- distant buildings -->
  <rect x="40" y="128" width="22" height="22" class="out out-sparse" />
  <rect x="66" y="122" width="14" height="28" class="out out-sparse" />
  <rect x="84" y="130" width="12" height="20" class="out out-sparse" />

  <!-- stepped building -->
  <path d="M 100 150 L 100 124 L 110 124 L 110 116 L 120 116 L 120 124 L 130 124 L 130 150 Z" class="out out-tight" />
  <rect x="103" y="130" width="2" height="2" class="dot" />
  <rect x="111" y="120" width="2" height="2" class="dot" />
  <rect x="123" y="130" width="2" height="2" class="dot" />
  <rect x="111" y="138" width="2" height="2" class="dot" />

  <!-- crane -->
